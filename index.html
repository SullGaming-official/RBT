<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RealityBreaker</title>

<style>
html,body{
margin:0;
padding:0;
width:100vw;
height:100vh;
overflow:hidden;
background:transparent;
touch-action:none;
}

#world{
position:absolute;
top:0;
left:0;
}

#playButton{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
background:rgba(0,0,0,0.7);
color:white;
font-size:32px;
font-family:Arial;
border-radius:12px;
cursor:pointer;
z-index:9999;
}
</style>
</head>

<body>

<div id="playButton">▶ Play</div>
<canvas id="world"></canvas>

<script src="https://unpkg.com/matter-js@0.20.0/build/matter.min.js"></script>

<script>

const {Engine,Render,World,Bodies,Runner,Mouse,MouseConstraint,Body,Events}=Matter;

const canvas=document.getElementById("world");
const playButton=document.getElementById("playButton");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();

const engine=Engine.create();
engine.gravity.y=1;

const render=Render.create({
canvas:canvas,
engine:engine,
options:{
wireframes:false,
background:"transparent"
}
});

let ground,ceiling,leftWall,rightWall;

function createWalls(){

const w=window.innerWidth;
const h=window.innerHeight;

ground=Bodies.rectangle(w/2,h+250,w+500,500,{isStatic:true,render:{visible:false}});
ceiling=Bodies.rectangle(w/2,-250,w+500,500,{isStatic:true,render:{visible:false}});
leftWall=Bodies.rectangle(-250,h/2,500,h+500,{isStatic:true,render:{visible:false}});
rightWall=Bodies.rectangle(w+250,h/2,500,h+500,{isStatic:true,render:{visible:false}});

World.add(engine.world,[ground,ceiling,leftWall,rightWall]);
}

createWalls();

const boxSize=120;

const box=Bodies.rectangle(
window.innerWidth/2,
window.innerHeight/4,
boxSize,
boxSize,
{
restitution:0.8,
frictionAir:0.01,
friction:0.001,
render:{fillStyle:"#0A013F"}
}
);

World.add(engine.world,box);

window.addEventListener("resize",()=>{

resizeCanvas();

World.remove(engine.world,ground);
World.remove(engine.world,ceiling);
World.remove(engine.world,leftWall);
World.remove(engine.world,rightWall);

createWalls();

});

let gravityEnabled=true;

function toggleGravity(){

if(gravityEnabled){

engine.gravity.x=0;
engine.gravity.y=1;

}else{

engine.gravity.x=0;
engine.gravity.y=0;

Body.applyForce(box,box.position,{
x:(Math.random()-0.5)*0.002,
y:-0.01
});

}

}

let lastTap=0;

canvas.addEventListener("touchend",(e)=>{

const now=Date.now();
const dt=now-lastTap;

if(dt<300){

const t=e.changedTouches[0];

const dx=t.clientX-box.position.x;
const dy=t.clientY-box.position.y;

if(Math.sqrt(dx*dx+dy*dy)<boxSize){

gravityEnabled=!gravityEnabled;
toggleGravity();

}

lastTap=0;
return;

}

lastTap=now;

});

canvas.addEventListener("contextmenu",(e)=>{

e.preventDefault();

const dx=e.clientX-box.position.x;
const dy=e.clientY-box.position.y;

if(Math.sqrt(dx*dx+dy*dy)<boxSize){

gravityEnabled=!gravityEnabled;
toggleGravity();

}

});

const mouse=Mouse.create(canvas);

const mouseConstraint=MouseConstraint.create(engine,{
mouse:mouse,
constraint:{
stiffness:0.2,
render:{visible:false}
}
});

World.add(engine.world,mouseConstraint);

let lastMousePos={x:0,y:0};

canvas.addEventListener("mousemove",(e)=>{

const pos={x:e.clientX,y:e.clientY};

const dx=pos.x-lastMousePos.x;
const dy=pos.y-lastMousePos.y;

const speed=Math.sqrt(dx*dx+dy*dy);

lastMousePos=pos;

const distX=pos.x-box.position.x;
const distY=pos.y-box.position.y;

const dist=Math.sqrt(distX*distX+distY*distY);

if(dist<180 && speed>8){

Body.applyForce(box,box.position,{
x:dx*0.005,
y:dy*0.005
});

}

});

Events.on(engine,"beforeUpdate",()=>{

const max=50;

let vx=box.velocity.x;
let vy=box.velocity.y;

if(vx>max)vx=max;
if(vx<-max)vx=-max;
if(vy>max)vy=max;
if(vy<-max)vy=-max;

Body.setVelocity(box,{x:vx,y:vy});

});

const runner=Runner.create();

function startGame(){
Runner.run(runner,engine);
Render.run(render);
}

function startMotion(){

window.addEventListener("deviceorientation",(event)=>{

if(!gravityEnabled)return;

const gx=event.gamma;
const gy=event.beta;

if(gx==null||gy==null)return;

engine.gravity.x=gx/30;
engine.gravity.y=gy/30;

});

}

playButton.addEventListener("click",()=>{

const el=document.documentElement;

if(el.requestFullscreen)el.requestFullscreen();

if(screen.orientation&&screen.orientation.lock){
screen.orientation.lock("portrait").catch(()=>{});
}

playButton.style.display="none";

startMotion();
startGame();

});

</script>

</body>
</html>
