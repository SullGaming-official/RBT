<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RealityBreaker</title>

<style>
html, body{
margin:0;
padding:0;
width:100vw;
height:100vh;
overflow:hidden;
background:transparent;
touch-action:none;
}

#world{
position:absolute;
top:0;
left:0;
}

#debug{
position:fixed;
bottom:20px;
left:20px;
color:white;
font-family:Arial,sans-serif;
font-size:18px;
text-shadow:0 0 5px black;
pointer-events:none;
}

#playButton{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
background:rgba(0,0,0,0.7);
color:white;
font-size:32px;
font-family:Arial,sans-serif;
border-radius:12px;
cursor:pointer;
z-index:9999;
user-select:none;
}
</style>
</head>

<body>

<div id="playButton">▶ Play</div>
<canvas id="world"></canvas>
<div id="debug">Reality Breaker ON</div>

<script src="https://unpkg.com/matter-js@0.20.0/build/matter.min.js"></script>

<script>

const playButton = document.getElementById("playButton");

const {
Engine,
Render,
World,
Bodies,
Runner,
Mouse,
MouseConstraint,
Body,
Events
} = Matter;

const canvas = document.getElementById('world');
const debug = document.getElementById('debug');

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resizeCanvas();

const engine = Engine.create();
engine.gravity.y = 1;

const render = Render.create({
canvas:canvas,
engine:engine,
options:{
wireframes:false,
background:'transparent'
}
});

let ground,ceiling,leftWall,rightWall;

function createWalls(){

const w = window.innerWidth;
const h = window.innerHeight;

ground = Bodies.rectangle(w/2,h+250,w+500,500,{isStatic:true,render:{visible:false}});
ceiling = Bodies.rectangle(w/2,-250,w+500,500,{isStatic:true,render:{visible:false}});
leftWall = Bodies.rectangle(-250,h/2,500,h+500,{isStatic:true,render:{visible:false}});
rightWall = Bodies.rectangle(w+250,h/2,500,h+500,{isStatic:true,render:{visible:false}});

World.add(engine.world,[ground,ceiling,leftWall,rightWall]);
}

createWalls();

const boxSize = 120;

const box = Bodies.rectangle(
window.innerWidth/2,
window.innerHeight/4,
boxSize,
boxSize,
{
restitution:0.8,
frictionAir:0.01,
friction:0.001,
render:{fillStyle:'#0A013F'}
}
);

World.add(engine.world,box);

function keepBoxInside(){

const w = window.innerWidth;
const h = window.innerHeight;
const half = boxSize/2;

let x = box.position.x;
let y = box.position.y;

if(x < half) x = half;
if(x > w-half) x = w-half;
if(y < half) y = half;
if(y > h-half) y = h-half;

Body.setPosition(box,{x,y});
Body.setVelocity(box,{x:0,y:0});
}

window.addEventListener('resize',()=>{

resizeCanvas();

World.remove(engine.world,ground);
World.remove(engine.world,ceiling);
World.remove(engine.world,leftWall);
World.remove(engine.world,rightWall);

createWalls();
keepBoxInside();

});

let gravityEnabled = true;

function toggleGravity(){

if(gravityEnabled){

engine.gravity.x = 0;
engine.gravity.y = 1;
debug.textContent="Gravity: ON";

}else{

engine.gravity.x = 0;
engine.gravity.y = 0;

Body.applyForce(box,box.position,{
x:(Math.random()-0.5)*0.002,
y:-0.01
});

debug.textContent="Gravity: OFF";

}

}

let lastTap = 0;

canvas.addEventListener("touchend",(e)=>{

const now = Date.now();
const dt = now-lastTap;

if(dt < 300){

const touch = e.changedTouches[0];

const dx = touch.clientX-box.position.x;
const dy = touch.clientY-box.position.y;
const dist = Math.sqrt(dx*dx+dy*dy);

if(dist < boxSize/1.2){

gravityEnabled = !gravityEnabled;
toggleGravity();

}

lastTap = 0;
return;

}

lastTap = now;

});

canvas.addEventListener("contextmenu",(e)=>{

e.preventDefault();

const dx = e.clientX-box.position.x;
const dy = e.clientY-box.position.y;
const dist = Math.sqrt(dx*dx+dy*dy);

if(dist < boxSize/1.2){

gravityEnabled = !gravityEnabled;
toggleGravity();

}

});

const mouse = Mouse.create(canvas);

const mouseConstraint = MouseConstraint.create(engine,{
mouse:mouse,
constraint:{
stiffness:0.2,
render:{visible:false}
}
});

World.add(engine.world,mouseConstraint);

let lastMousePos = {x:0,y:0};
let interactive = false;

const INTERACT_RADIUS = 180;
const EXIT_RADIUS = 220;
const SPEED_THRESHOLD = 8;
const PUNCH_FORCE = 0.005;

canvas.addEventListener('mousemove',(e)=>{

const mousePos = {x:e.clientX,y:e.clientY};

const dx = mousePos.x-lastMousePos.x;
const dy = mousePos.y-lastMousePos.y;

const speed = Math.sqrt(dx*dx+dy*dy);

lastMousePos = mousePos;

const distX = mousePos.x-box.position.x;
const distY = mousePos.y-box.position.y;

const dist = Math.sqrt(distX*distX+distY*distY);

if(!interactive && dist < INTERACT_RADIUS){

interactive = true;
debug.textContent = 'Near block: drag it or smack it';

}else if(interactive && dist > EXIT_RADIUS){

interactive = false;
debug.textContent = 'Reality Breaker ON';

}

if(dist < INTERACT_RADIUS && speed > SPEED_THRESHOLD){

Body.applyForce(box,box.position,{
x:dx*PUNCH_FORCE,
y:dy*PUNCH_FORCE
});

}

});

Events.on(engine,'beforeUpdate',()=>{

const maxSpeed = 50;

let vx = box.velocity.x;
let vy = box.velocity.y;

if(vx > maxSpeed) vx = maxSpeed;
if(vx < -maxSpeed) vx = -maxSpeed;
if(vy > maxSpeed) vy = maxSpeed;
if(vy < -maxSpeed) vy = -maxSpeed;

Body.setVelocity(box,{x:vx,y:vy});

});

const runner = Runner.create();

function startGame(){
Runner.run(runner,engine);
Render.run(render);
}

async function startMotion(){

if(typeof DeviceMotionEvent !== "undefined" &&
typeof DeviceMotionEvent.requestPermission === "function"){

try{

const permission = await DeviceMotionEvent.requestPermission();
if(permission !== "granted") return;

}catch{}

}

window.addEventListener("deviceorientation",(event)=>{

const tiltX = event.gamma;
const tiltY = event.beta;

if(tiltX == null || tiltY == null) return;

if(gravityEnabled){

engine.gravity.x = tiltX/30;
engine.gravity.y = tiltY/30;

}

});

let lastShake = 0;

window.addEventListener("devicemotion",(event)=>{

const acc = event.accelerationIncludingGravity;
if(!acc) return;

const ax = acc.x || 0;
const ay = acc.y || 0;

const strength = Math.abs(ax)+Math.abs(ay);

if(strength > 25){

const now = Date.now();

if(now-lastShake > 200){

Body.applyForce(box,box.position,{
x:ax*0.002,
y:-ay*0.002
});

debug.textContent =
"Shake X:"+ax.toFixed(1)+" Y:"+ay.toFixed(1);

lastShake = now;

}

}

});

}

playButton.addEventListener("click",async()=>{

const el = document.documentElement;

if(el.requestFullscreen) el.requestFullscreen();
else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
else if(el.msRequestFullscreen) el.msRequestFullscreen();

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("portrait").catch(()=>{});
}

playButton.style.display="none";

startMotion();
startGame();

});

</script>

</body>
</html>
