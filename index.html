<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>RealityBreaker</title>
  <style>
    html,body{
      margin:0;
      padding:0;
      height:100%;
      background:transparent;
      -webkit-user-select:none;
      user-select:none;
      touch-action:none;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    #world{
      position:absolute;
      top:0;
      left:0;
      display:block;
      background:transparent;
      touch-action:none;
    }

    #playButton{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      padding:20px 40px;
      background:rgba(0,0,0,0.75);
      color:white;
      font-size:32px;
      border-radius:12px;
      cursor:pointer;
      z-index:9999;
      user-select:none;
      touch-action:manipulation;
    }
  </style>
</head>
<body>
  <div id="playButton">▶ Play</div>
  <canvas id="world"></canvas>

  <script src="https://unpkg.com/matter-js@0.20.0/build/matter.min.js"></script>
  <script>
  /* RealityBreaker
     - Works on mobile and PC
     - No tilt on PC; tilt enabled only on mobile
     - Picking up & holding (mouse or touch) follows pointer; on release it throws and can bounce back
     - Double-tap (touch) or right-click toggles gravity
  */

  const playButton = document.getElementById('playButton');
  const canvas = document.getElementById('world');

  const { Engine, Render, World, Bodies, Runner, Mouse, MouseConstraint, Body, Events } = Matter;

  // detect mobile
  const isMobile = /Mobi|Android|iPhone|iPad|iPod|Tablet/i.test(navigator.userAgent) || ('ontouchstart' in window && navigator.maxTouchPoints > 0);

  // canvas sizing
  function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // engine + render
  const engine = Engine.create();
  engine.gravity.y = 1;

  const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      wireframes: false,
      background: 'transparent'
    }
  });

  // walls
  let ground, ceiling, leftWall, rightWall;
  function createWalls(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    if (ground) World.remove(engine.world, ground);
    if (ceiling) World.remove(engine.world, ceiling);
    if (leftWall) World.remove(engine.world, leftWall);
    if (rightWall) World.remove(engine.world, rightWall);

    ground = Bodies.rectangle(w/2, h + 250, w + 500, 500, { isStatic:true, render:{visible:false} });
    ceiling = Bodies.rectangle(w/2, -250, w + 500, 500, { isStatic:true, render:{visible:false} });
    leftWall = Bodies.rectangle(-250, h/2, 500, h + 500, { isStatic:true, render:{visible:false} });
    rightWall = Bodies.rectangle(w + 250, h/2, 500, h + 500, { isStatic:true, render:{visible:false} });

    World.add(engine.world, [ground, ceiling, leftWall, rightWall]);
  }
  createWalls();

  // box
  const boxSize = 120;
  let box = Bodies.rectangle(window.innerWidth/2, window.innerHeight/4, boxSize, boxSize, {
    restitution: 0.8,
    frictionAir: 0.01,
    friction: 0.001,
    render: { fillStyle: '#0A013F' }
  });
  World.add(engine.world, box);

  function keepBoxInside(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    const half = boxSize/2;
    let x = box.position.x;
    let y = box.position.y;
    if (x < half) x = half;
    if (x > w-half) x = w-half;
    if (y < half) y = half;
    if (y > h-half) y = h-half;
    Body.setPosition(box, { x, y });
    Body.setVelocity(box, { x:0, y:0 });
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    createWalls();
    keepBoxInside();
  });

  // gravity toggle
  let gravityEnabled = true;
  function toggleGravity(){
    gravityEnabled = !gravityEnabled;
    if (gravityEnabled){
      engine.gravity.y = 1;
    } else {
      engine.gravity.y = 0;
      Body.applyForce(box, box.position, { x:(Math.random()-0.5)*0.002, y:-0.01 });
    }
  }

  // pointer mapping (client -> canvas logical coords)
  function clientToCanvas(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  // mouse constraint kept for clicks but we implement custom pickup to match simple example
  const mouse = Mouse.create(canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.2, render: { visible: false } }
  });
  World.add(engine.world, mouseConstraint);

  // interactive "smack" feedback (keeps original behavior without on-screen text)
  let lastMousePos = { x:0, y:0 };
  let interactive = false;
  const INTERACT_RADIUS = 180;
  const EXIT_RADIUS = 220;
  const SPEED_THRESHOLD = 8;
  const PUNCH_FORCE = 0.005;

  // custom pickup/hold/throw behavior (works for mouse & touch)
  let holding = false;
  let holdPointerId = null;
  let holdPointerType = null;
  let holdOffset = { x:0, y:0 };
  let lastHoldPos = null;
  let lastHoldTime = 0;

  function tryStartHold(pointerId, pointerType, clientX, clientY){
    const pos = clientToCanvas(clientX, clientY);
    const boxCanvasPos = { x: box.position.x, y: box.position.y };
    const dx = pos.x - boxCanvasPos.x;
    const dy = pos.y - boxCanvasPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= boxSize * 0.7){
      holding = true;
      holdPointerId = pointerId;
      holdPointerType = pointerType;
      holdOffset.x = pos.x - boxCanvasPos.x;
      holdOffset.y = pos.y - boxCanvasPos.y;
      lastHoldPos = pos;
      lastHoldTime = performance.now();
      Body.setVelocity(box, { x:0, y:0 });
      return true;
    }
    return false;
  }

  function moveHold(clientX, clientY){
    if (!holding) return;
    const pos = clientToCanvas(clientX, clientY);
    const targetX = pos.x - holdOffset.x;
    const targetY = pos.y - holdOffset.y;
    Body.setPosition(box, { x: targetX, y: targetY });
    Body.setVelocity(box, { x:0, y:0 });
    lastHoldPos = pos;
    lastHoldTime = performance.now();
  }

  function endHold(clientX, clientY){
    if (!holding) return;
    const now = performance.now();
    const pos = clientToCanvas(clientX, clientY);
    const dt = Math.max(1, now - lastHoldTime); // ms
    const vx = (pos.x - lastHoldPos.x) / (dt / 1000); // px/s
    const vy = (pos.y - lastHoldPos.y) / (dt / 1000); // px/s

    // apply throw velocity scaled down to world units
    const velocityScale = 0.02;
    Body.setVelocity(box, { x: vx * velocityScale, y: vy * velocityScale });

    // bounce-back on strong throws (same behavior on PC & mobile)
    const speed = Math.sqrt(vx*vx + vy*vy);
    const throwThreshold = 200; // px/s
    if (speed > throwThreshold){
      const originalRest = box.restitution || 0.8;
      box.restitution = Math.max(originalRest, 1.2);
      const impulseScale = 0.0006;
      Body.applyForce(box, box.position, { x: -vx * impulseScale, y: -vy * impulseScale });
      setTimeout(()=> { box.restitution = originalRest; }, 300);
    }

    holding = false;
    holdPointerId = null;
    holdPointerType = null;
    lastHoldPos = null;
  }

  // pointer events: unify mouse & touch behavior
  document.addEventListener('pointerdown', (e) => {
    // only left mouse button
    if (e.pointerType === 'mouse' && e.button !== 0) return;

    // try to start hold; if started, capture pointer
    const started = tryStartHold(e.pointerId, e.pointerType, e.clientX, e.clientY);
    if (started){
      try { (e.target || document).setPointerCapture(e.pointerId); } catch (err) {}
      e.preventDefault();
    }
  }, { passive:false });

  document.addEventListener('pointermove', (e) => {
    // if holding with this pointer, move the box
    if (holding && e.pointerId === holdPointerId){
      moveHold(e.clientX, e.clientY);
      e.preventDefault();
      return;
    }

    // otherwise, update "smack" behavior (like original)
    const mousePos = { x: e.clientX, y: e.clientY };
    const dx = mousePos.x - lastMousePos.x;
    const dy = mousePos.y - lastMousePos.y;
    const speed = Math.sqrt(dx*dx + dy*dy);
    lastMousePos = mousePos;

    // compute distance in screen coords between pointer and box (box.position is in canvas pixels)
    const rect = canvas.getBoundingClientRect();
    const boxScreenX = box.position.x * (rect.width / canvas.width) + rect.left;
    const boxScreenY = box.position.y * (rect.height / canvas.height) + rect.top;
    const distX = e.clientX - boxScreenX;
    const distY = e.clientY - boxScreenY;
    const dist = Math.sqrt(distX*distX + distY*distY);

    if (!interactive && dist < INTERACT_RADIUS) {
      interactive = true;
    } else if (interactive && dist > EXIT_RADIUS) {
      interactive = false;
    }

    if (dist < INTERACT_RADIUS && speed > SPEED_THRESHOLD){
      Body.applyForce(box, box.position, { x: dx * PUNCH_FORCE, y: dy * PUNCH_FORCE });
    }
  }, { passive:false });

  document.addEventListener('pointerup', (e) => {
    if (holding && e.pointerId === holdPointerId){
      endHold(e.clientX, e.clientY);
      try { (e.target || document).releasePointerCapture(e.pointerId); } catch (err) {}
      e.preventDefault();
    }
  }, { passive:false });

  document.addEventListener('pointercancel', (e) => {
    if (holding && e.pointerId === holdPointerId){
      // cancel hold without throw
      holding = false;
      holdPointerId = null;
      holdPointerType = null;
      lastHoldPos = null;
      try { (e.target || document).releasePointerCapture(e.pointerId); } catch (err) {}
    }
  }, { passive:false });

  // double-tap (touch) toggles gravity
  let lastTap = 0;
  canvas.addEventListener('touchend', (e) => {
    const now = Date.now();
    const dt = now - lastTap;
    if (dt < 300){
      const touch = e.changedTouches[0];
      const rect = canvas.getBoundingClientRect();
      const boxScreenX = box.position.x * (rect.width / canvas.width) + rect.left;
      const boxScreenY = box.position.y * (rect.height / canvas.height) + rect.top;
      const dx = touch.clientX - boxScreenX;
      const dy = touch.clientY - boxScreenY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < boxSize / 1.2) {
        toggleGravity();
      }
      lastTap = 0;
      return;
    }
    lastTap = now;
  });

  // right-click toggles gravity on PC
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const boxScreenX = box.position.x * (rect.width / canvas.width) + rect.left;
    const boxScreenY = box.position.y * (rect.height / canvas.height) + rect.top;
    const dx = e.clientX - boxScreenX;
    const dy = e.clientY - boxScreenY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < boxSize / 1.2) {
      toggleGravity();
    }
  });

  // clamp velocity
  Events.on(engine, 'beforeUpdate', () => {
    const maxSpeed = 50;
    let vx = box.velocity.x;
    let vy = box.velocity.y;
    if (vx > maxSpeed) vx = maxSpeed;
    if (vx < -maxSpeed) vx = -maxSpeed;
    if (vy > maxSpeed) vy = maxSpeed;
    if (vy < -maxSpeed) vy = -maxSpeed;
    Body.setVelocity(box, { x: vx, y: vy });
  });

  // runner/render
  const runner = Runner.create();
  function startGame(){
    Runner.run(runner, engine);
    Render.run(render);
  }

  // device tilt only on mobile
  async function startMotion(){
    if (!isMobile) return; // no tilt on PC
    if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function"){
      try {
        const permission = await DeviceMotionEvent.requestPermission();
        if (permission !== "granted") return;
      } catch {}
    }
    window.addEventListener('deviceorientation', (event) => {
      const tiltX = event.gamma;
      const tiltY = event.beta;
      if (tiltX == null || tiltY == null) return;
      if (gravityEnabled){
        engine.gravity.x = tiltX / 30;
        engine.gravity.y = tiltY / 30;
      }
    });
  }

  // play button: fullscreen then start
  playButton.addEventListener('click', async () => {
    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) await el.msRequestFullscreen();
    } catch {}
    playButton.style.display = 'none';
    startMotion();
    startGame();
  });

  </script>
</body>
</html>
