<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>RealityBreaker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Wrapper and content for rotation fallback */
    .portrait-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      overflow: hidden;
      pointer-events: auto;
    }

    #content {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: 50% 50%;
      will-change: transform;
      touch-action: none;
    }

    /* Fallback classes (transforms applied from JS) */
    .rotate-to-portrait #content { }
    .rotate-180 #content { }

    #world {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      background: transparent;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #playButton {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 32px;
      border-radius: 12px;
      cursor: pointer;
      z-index: 9999;
      user-select: none;
      touch-action: manipulation;
    }

    /* Keep play button readable when content is rotated */
    .rotate-to-portrait #playButton { transform: rotate(90deg) translate(-50%, -50%); transform-origin: center; }
    .rotate-180 #playButton { transform: rotate(180deg) translate(-50%, -50%); transform-origin: center; }
  </style>
</head>
<body>
  <div id="portraitWrapper" class="portrait-wrapper">
    <div id="content">
      <div id="playButton">▶ Play</div>
      <canvas id="world"></canvas>
    </div>
  </div>

  <script src="https://unpkg.com/matter-js@0.20.0/build/matter.min.js"></script>

  <script>
  /*
    RealityBreaker - unified file
    - Portrait lock attempt + rotation fallback for tablets/phones
    - Works on PC: mouse dragging, throwing, clicking, right-click toggles gravity
    - Custom pointer-based pickup/drag that works with transforms
    - Keeps Matter.js walls and canvas in sync on resize
  */

  const playButton = document.getElementById('playButton');
  const wrapper = document.getElementById('portraitWrapper');
  const content = document.getElementById('content');
  const canvas = document.getElementById('world');

  const { Engine, Render, World, Bodies, Runner, Mouse, MouseConstraint, Body, Events } = Matter;

  // Logical canvas size (portrait-oriented)
  let logicalWidth = window.innerWidth;
  let logicalHeight = window.innerHeight;

  function setCanvasSize(w, h) {
    logicalWidth = Math.round(w);
    logicalHeight = Math.round(h);
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.round(logicalWidth * ratio);
    canvas.height = Math.round(logicalHeight * ratio);
    canvas.style.width = logicalWidth + 'px';
    canvas.style.height = logicalHeight + 'px';
  }

  setCanvasSize(logicalWidth, logicalHeight);

  const engine = Engine.create();
  engine.gravity.y = 1;

  const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      wireframes: false,
      background: 'transparent',
      width: logicalWidth,
      height: logicalHeight,
      pixelRatio: window.devicePixelRatio || 1
    }
  });

  let ground, ceiling, leftWall, rightWall;
  const boxSize = 120;
  let box;

  function createWalls() {
    if (ground) World.remove(engine.world, ground);
    if (ceiling) World.remove(engine.world, ceiling);
    if (leftWall) World.remove(engine.world, leftWall);
    if (rightWall) World.remove(engine.world, rightWall);

    const w = logicalWidth;
    const h = logicalHeight;

    ground = Bodies.rectangle(w/2, h + 250, w + 500, 500, { isStatic: true, render: { visible: false } });
    ceiling = Bodies.rectangle(w/2, -250, w + 500, 500, { isStatic: true, render: { visible: false } });
    leftWall = Bodies.rectangle(-250, h/2, 500, h + 500, { isStatic: true, render: { visible: false } });
    rightWall = Bodies.rectangle(w + 250, h/2, 500, h + 500, { isStatic: true, render: { visible: false } });

    World.add(engine.world, [ground, ceiling, leftWall, rightWall]);
  }

  function createBox() {
    if (box) World.remove(engine.world, box);
    box = Bodies.rectangle(
      logicalWidth / 2,
      logicalHeight / 4,
      boxSize,
      boxSize,
      { restitution: 0.8, frictionAir: 0.01, friction: 0.001, render: { fillStyle: '#0A013F' } }
    );
    World.add(engine.world, box);
  }

  function keepBoxInside() {
    const w = logicalWidth;
    const h = logicalHeight;
    const half = boxSize / 2;
    let x = box.position.x;
    let y = box.position.y;
    if (x < half) x = half;
    if (x > w - half) x = w - half;
    if (y < half) y = half;
    if (y > h - half) y = h - half;
    Body.setPosition(box, { x, y });
    Body.setVelocity(box, { x: 0, y: 0 });
  }

  // Map client coordinates to canvas logical coordinates (handles transforms)
  function clientToCanvas(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (logicalWidth / rect.width);
    const y = (clientY - rect.top) * (logicalHeight / rect.height);
    return { x, y };
  }

  // Read device orientation angle if available
  function getDeviceAngle() {
    if (screen.orientation && typeof screen.orientation.angle === 'number') return screen.orientation.angle;
    if (typeof window.orientation === 'number') return window.orientation;
    return 0;
  }

  // Rotation fallback and 180deg correction
  function applyRotationFallback() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const angle = ((getDeviceAngle() % 360) + 360) % 360;

    wrapper.classList.remove('rotate-to-portrait', 'rotate-180');

    if (vw > vh) {
      // Landscape -> rotate content -90deg and scale to fit
      wrapper.classList.add('rotate-to-portrait');
      const portraitW = vh;
      const portraitH = vw;
      const scaleX = vw / portraitW;
      const scaleY = vh / portraitH;
      const scale = Math.min(scaleX, scaleY);
      content.style.transform = `rotate(-90deg) scale(${scale})`;
      content.style.transformOrigin = '50% 50%';
      setCanvasSize(portraitW, portraitH);
      content.style.width = portraitW + 'px';
      content.style.height = portraitH + 'px';
    } else {
      // Native portrait: correct upside-down (180deg) if detected
      if (angle === 180) {
        wrapper.classList.add('rotate-180');
        content.style.transform = 'rotate(180deg)';
        content.style.transformOrigin = '50% 50%';
      } else {
        content.style.transform = '';
        content.style.width = '';
        content.style.height = '';
      }
      setCanvasSize(window.innerWidth, window.innerHeight);
    }

    // Update Matter render sizes and walls
    render.options.width = logicalWidth;
    render.options.height = logicalHeight;
    const ratio = window.devicePixelRatio || 1;
    render.canvas.width = canvas.width;
    render.canvas.height = canvas.height;
    render.canvas.style.width = canvas.style.width;
    render.canvas.style.height = canvas.style.height;
    if (render.context && render.context.setTransform) render.context.setTransform(ratio, 0, 0, ratio, 0, 0);

    createWalls();
    if (!box) createBox();
    keepBoxInside();
  }

  // Try to lock orientation to portrait-primary (prevents upside-down) when possible
  async function enforcePortrait() {
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('portrait-primary');
        setCanvasSize(window.innerWidth, window.innerHeight);
        render.options.width = logicalWidth;
        render.options.height = logicalHeight;
        const ratio = window.devicePixelRatio || 1;
        render.canvas.width = canvas.width;
        render.canvas.height = canvas.height;
        render.canvas.style.width = canvas.style.width;
        render.canvas.style.height = canvas.style.height;
        if (render.context && render.context.setTransform) render.context.setTransform(ratio, 0, 0, ratio, 0, 0);
        wrapper.classList.remove('rotate-to-portrait', 'rotate-180');
        createWalls();
        keepBoxInside();
        return;
      }
    } catch (err) {
      // ignore and fallback
    }
    applyRotationFallback();
  }

  // Initial world
  applyRotationFallback();
  createBox();

  // Resize/orientation handlers
  window.addEventListener('resize', () => setTimeout(applyRotationFallback, 30));
  window.addEventListener('orientationchange', () => setTimeout(applyRotationFallback, 50));

  // Gravity toggle
  let gravityEnabled = true;
  function toggleGravity() {
    gravityEnabled = !gravityEnabled;
    if (gravityEnabled) {
      engine.gravity.x = 0;
      engine.gravity.y = 1;
    } else {
      engine.gravity.x = 0;
      engine.gravity.y = 0;
      Body.applyForce(box, box.position, { x: (Math.random() - 0.5) * 0.002, y: -0.01 });
    }
  }

  // --- Custom pickup/drag implementation (works with transforms and on PC) ---
  let isDragging = false;
  let dragPointerId = null;
  let dragOffset = { x: 0, y: 0 };
  let lastDragPos = null;
  let lastDragTime = 0;

  function startDrag(pointerId, clientX, clientY) {
    const pos = clientToCanvas(clientX, clientY);
    const dx = pos.x - box.position.x;
    const dy = pos.y - box.position.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= boxSize * 0.7) {
      isDragging = true;
      dragPointerId = pointerId;
      dragOffset.x = pos.x - box.position.x;
      dragOffset.y = pos.y - box.position.y;
      lastDragPos = pos;
      lastDragTime = performance.now();
      Body.setVelocity(box, { x: 0, y: 0 });
      return true;
    }
    return false;
  }

  function moveDrag(clientX, clientY) {
    if (!isDragging) return;
    const pos = clientToCanvas(clientX, clientY);
    const targetX = pos.x - dragOffset.x;
    const targetY = pos.y - dragOffset.y;
    Body.setPosition(box, { x: targetX, y: targetY });
    Body.setVelocity(box, { x: 0, y: 0 });
    lastDragPos = pos;
    lastDragTime = performance.now();
  }

  function endDrag(clientX, clientY) {
    if (!isDragging) return;
    const now = performance.now();
    const pos = clientToCanvas(clientX, clientY);
    const dt = Math.max(1, now - lastDragTime);
    const vx = (pos.x - lastDragPos.x) / (dt / 1000);
    const vy = (pos.y - lastDragPos.y) / (dt / 1000);
    const velocityScale = 0.02;
    Body.setVelocity(box, { x: vx * velocityScale, y: vy * velocityScale });
    isDragging = false;
    dragPointerId = null;
    lastDragPos = null;
  }

  // Pointer events (works on PC and touch)
  document.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse' && e.button !== 0) return; // only left button
    const started = startDrag(e.pointerId, e.clientX, e.clientY);
    if (started) {
      try { (e.target || document).setPointerCapture(e.pointerId); } catch (err) {}
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('pointermove', (e) => {
    if (isDragging && e.pointerId === dragPointerId) {
      moveDrag(e.clientX, e.clientY);
      e.preventDefault();
      return;
    }

    // Non-drag pointer movement: keep "smack" behavior for quick mouse moves
    const pos = clientToCanvas(e.clientX, e.clientY);
    if (!window._rb_lastMousePos) window._rb_lastMousePos = { x: pos.x, y: pos.y };
    const dx = pos.x - window._rb_lastMousePos.x;
    const dy = pos.y - window._rb_lastMousePos.y;
    const speed = Math.sqrt(dx*dx + dy*dy);
    window._rb_lastMousePos = pos;

    const distX = pos.x - box.position.x;
    const distY = pos.y - box.position.y;
    const dist = Math.sqrt(distX*distX + distY*distY);

    const INTERACT_RADIUS = 180;
    const SPEED_THRESHOLD = 8;
    const PUNCH_FORCE = 0.005;

    if (dist < INTERACT_RADIUS && speed > SPEED_THRESHOLD) {
      Body.applyForce(box, box.position, { x: dx * PUNCH_FORCE, y: dy * PUNCH_FORCE });
    }
  }, { passive: false });

  document.addEventListener('pointerup', (e) => {
    if (isDragging && e.pointerId === dragPointerId) {
      endDrag(e.clientX, e.clientY);
      try { (e.target || document).releasePointerCapture(e.pointerId); } catch (err) {}
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('pointercancel', (e) => {
    if (isDragging && e.pointerId === dragPointerId) {
      isDragging = false;
      dragPointerId = null;
      lastDragPos = null;
      try { (e.target || document).releasePointerCapture(e.pointerId); } catch (err) {}
    }
  });

  // Keep a lightweight MouseConstraint for clicks/drags that happen directly on canvas
  const mouse = Mouse.create(canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.2, render: { visible: false } }
  });
  World.add(engine.world, mouseConstraint);

  // Double-tap (touch) toggles gravity
  let lastTap = 0;
  canvas.addEventListener('touchend', (e) => {
    const now = Date.now();
    const dt = now - lastTap;
    if (dt < 300) {
      const touch = e.changedTouches[0];
      const pos = clientToCanvas(touch.clientX, touch.clientY);
      const dx = pos.x - box.position.x;
      const dy = pos.y - box.position.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < boxSize / 1.2) toggleGravity();
      lastTap = 0;
      return;
    }
    lastTap = now;
  });

  // Right-click toggles gravity on PC
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const pos = clientToCanvas(e.clientX, e.clientY);
    const dx = pos.x - box.position.x;
    const dy = pos.y - box.position.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < boxSize / 1.2) toggleGravity();
  });

  // Velocity clamp
  Events.on(engine, 'beforeUpdate', () => {
    const maxSpeed = 50;
    let vx = box.velocity.x;
    let vy = box.velocity.y;
    if (vx > maxSpeed) vx = maxSpeed;
    if (vx < -maxSpeed) vx = -maxSpeed;
    if (vy > maxSpeed) vy = maxSpeed;
    if (vy < -maxSpeed) vy = -maxSpeed;
    Body.setVelocity(box, { x: vx, y: vy });
  });

  const runner = Runner.create();
  function startGame() {
    Runner.run(runner, engine);
    Render.run(render);
  }

  // Device motion/orientation (optional; harmless on PC)
  async function startMotion() {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const permission = await DeviceMotionEvent.requestPermission();
        if (permission !== 'granted') return;
      } catch {}
    }
    window.addEventListener('deviceorientation', (event) => {
      const tiltX = event.gamma;
      const tiltY = event.beta;
      if (tiltX == null || tiltY == null) return;
      if (gravityEnabled) {
        engine.gravity.x = tiltX / 30;
        engine.gravity.y = tiltY / 30;
      }
    });
  }

  // Play button: request fullscreen, attempt orientation lock, fallback, then start
  playButton.addEventListener('click', async () => {
    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) await el.msRequestFullscreen();
    } catch {}

    await enforcePortrait();

    playButton.style.display = 'none';
    startMotion();
    startGame();
  });

  // Expose a simple keyboard control for PC: space toggles gravity, R recenters box
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      toggleGravity();
    } else if (e.key === 'r' || e.key === 'R') {
      Body.setPosition(box, { x: logicalWidth / 2, y: logicalHeight / 4 });
      Body.setVelocity(box, { x: 0, y: 0 });
    }
  });

  </script>
</body>
</html>
