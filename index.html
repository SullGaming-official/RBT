<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RealityBreaker</title>

<style>
html,body{
margin:0;
padding:0;
width:100vw;
height:100vh;
overflow:hidden;
background:transparent;
touch-action:none;
}

#world{
position:absolute;
top:0;
left:0;
}

#playButton{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
background:rgba(0,0,0,0.7);
color:white;
font-size:32px;
font-family:Arial;
border-radius:12px;
cursor:pointer;
z-index:9999;
}
</style>
</head>

<body>

<div id="playButton">▶ Play</div>
<canvas id="world"></canvas>

<script src="https://unpkg.com/matter-js@0.20.0/build/matter.min.js"></script>

<script>

const {Engine,Render,World,Bodies,Runner,Mouse,MouseConstraint,Body,Events}=Matter;

const canvas=document.getElementById("world");
const playButton=document.getElementById("playButton");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();

const engine=Engine.create();
engine.gravity.y=1;

const render=Render.create({
canvas:canvas,
engine:engine,
options:{wireframes:false,background:"transparent"}
});

let ground,ceiling,leftWall,rightWall;

function createWalls(){

const w=window.innerWidth;
const h=window.innerHeight;

ground=Bodies.rectangle(w/2,h+250,w+500,500,{isStatic:true,render:{visible:false}});
ceiling=Bodies.rectangle(w/2,-250,w+500,500,{isStatic:true,render:{visible:false}});
leftWall=Bodies.rectangle(-250,h/2,500,h+500,{isStatic:true,render:{visible:false}});
rightWall=Bodies.rectangle(w+250,h/2,500,h+500,{isStatic:true,render:{visible:false}});

World.add(engine.world,[ground,ceiling,leftWall,rightWall]);
}

createWalls();

const boxSize=120;

const box=Bodies.rectangle(
window.innerWidth/2,
window.innerHeight/4,
boxSize,
boxSize,
{
restitution:0.8,
frictionAir:0.01,
render:{fillStyle:"#0A013F"}
}
);

World.add(engine.world,box);

let gravityEnabled=true;

function toggleGravity(){

if(gravityEnabled){

engine.gravity.x=0;
engine.gravity.y=1;

}else{

engine.gravity.x=0;
engine.gravity.y=0;

}

}

let lastTap=0;

canvas.addEventListener("touchend",(e)=>{

const now=Date.now();
const dt=now-lastTap;

if(dt<300){

const t=e.changedTouches[0];

const dx=t.clientX-box.position.x;
const dy=t.clientY-box.position.y;

if(Math.sqrt(dx*dx+dy*dy)<boxSize){

gravityEnabled=!gravityEnabled;
toggleGravity();

}

lastTap=0;
return;
}

lastTap=now;

});

const mouse=Mouse.create(canvas);

const mouseConstraint=MouseConstraint.create(engine,{
mouse:mouse,
constraint:{stiffness:0.2,render:{visible:false}}
});

World.add(engine.world,mouseConstraint);

Events.on(engine,"beforeUpdate",()=>{

const max=80;

let vx=box.velocity.x;
let vy=box.velocity.y;

if(vx>max)vx=max;
if(vx<-max)vx=-max;
if(vy>max)vy=max;
if(vy<-max)vy=-max;

Body.setVelocity(box,{x:vx,y:vy});

});

const runner=Runner.create();

function startGame(){
Runner.run(runner,engine);
Render.run(render);
}

async function startMotion(){

if(typeof DeviceMotionEvent!=="undefined" &&
typeof DeviceMotionEvent.requestPermission==="function"){

try{
const p=await DeviceMotionEvent.requestPermission();
if(p!=="granted")return;
}catch{}

}

window.addEventListener("deviceorientation",(event)=>{

if(!gravityEnabled)return;

const gx=event.gamma;
const gy=event.beta;

if(gx==null||gy==null)return;

engine.gravity.x=gx/30;
engine.gravity.y=gy/30;

});

let lastShake=0;

window.addEventListener("devicemotion",(event)=>{

const acc=event.accelerationIncludingGravity;
if(!acc)return;

const ax=acc.x||0;
const ay=acc.y||0;

const strength=Math.sqrt(ax*ax+ay*ay);

if(strength>8){

const now=Date.now();

if(now-lastShake>60){

// FORCE SCALES WITH SHAKE STRENGTH
const power=strength*0.004;

Body.applyForce(box,box.position,{
x:ax*power,
y:-ay*power
});

lastShake=now;

}

}

});

}

playButton.addEventListener("click",()=>{

const el=document.documentElement;

if(el.requestFullscreen)el.requestFullscreen();

if(screen.orientation&&screen.orientation.lock){
screen.orientation.lock("portrait").catch(()=>{});
}

playButton.style.display="none";

startMotion();
startGame();

});

</script>

</body>
</html>
