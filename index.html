<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>RealityBreaker</title>
  <style>
    html,body{
      margin:0;
      padding:0;
      height:100%;
      background:transparent;
      -webkit-user-select:none;
      user-select:none;
      touch-action:none;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    #world{
      position:absolute;
      top:0;
      left:0;
      display:block;
      background:transparent;
      touch-action:none;
    }

    #playButton{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      padding:18px 36px;
      background:rgba(0,0,0,0.75);
      color:white;
      font-size:28px;
      border-radius:10px;
      cursor:pointer;
      z-index:9999;
      user-select:none;
      touch-action:manipulation;
    }
  </style>
</head>
<body>
  <div id="playButton">▶ Play</div>
  <canvas id="world"></canvas>

  <script src="https://unpkg.com/matter-js@0.20.0/build/matter.min.js"></script>
  <script>
  /*
    RealityBreaker - Final adjustments
    - Mobile and PC both slide after a throw (same behavior)
    - On PC you can continuously hold the block (pointer capture on canvas)
    - Custom pointer-only pickup/hold/throw (no MouseConstraint)
    - Power increases only when you perform a throw
  */

  const playButton = document.getElementById('playButton');
  const canvas = document.getElementById('world');

  const { Engine, Render, World, Bodies, Runner, Body, Events } = Matter;

  // detect mobile
  const isMobile = /Mobi|Android|iPhone|iPad|iPod|Tablet/i.test(navigator.userAgent) || ('ontouchstart' in window && navigator.maxTouchPoints > 0);

  // canvas sizing
  function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', () => {
    resizeCanvas();
    createWalls();
    keepBoxInside();
  });

  // Matter setup
  const engine = Engine.create();
  engine.gravity.y = 1;

  const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      wireframes: false,
      background: 'transparent'
    }
  });

  // walls
  let ground, ceiling, leftWall, rightWall;
  function createWalls(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    if (ground) World.remove(engine.world, ground);
    if (ceiling) World.remove(engine.world, ceiling);
    if (leftWall) World.remove(engine.world, leftWall);
    if (rightWall) World.remove(engine.world, rightWall);

    // thick invisible walls so collisions are robust
    ground = Bodies.rectangle(w/2, h + 250, w + 500, 500, { isStatic:true, render:{visible:false}, label: 'wall' });
    ceiling = Bodies.rectangle(w/2, -250, w + 500, 500, { isStatic:true, render:{visible:false}, label: 'wall' });
    leftWall = Bodies.rectangle(-250, h/2, 500, h + 500, { isStatic:true, render:{visible:false}, label: 'wall' });
    rightWall = Bodies.rectangle(w + 250, h/2, 500, h + 500, { isStatic:true, render:{visible:false}, label: 'wall' });

    World.add(engine.world, [ground, ceiling, leftWall, rightWall]);
  }
  createWalls();

  // box: low frictionAir and low friction so it slides naturally on both platforms
  const boxSize = 120;
  let box = Bodies.rectangle(window.innerWidth/2, window.innerHeight/4, boxSize, boxSize, {
    restitution: 0.8,
    frictionAir: 0.001,   // very low air drag so it slides
    friction: 0.0,        // surface friction
    label: 'box',
    render: { fillStyle: '#0A013F' }
  });
  World.add(engine.world, box);

  function keepBoxInside(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    const half = boxSize/2;
    let x = box.position.x;
    let y = box.position.y;
    if (x < half) x = half;
    if (x > w-half) x = w-half;
    if (y < half) y = half;
    if (y > h-half) y = h-half;
    Body.setPosition(box, { x, y });
    Body.setVelocity(box, { x:0, y:0 });
  }

  // gravity toggle (right-click or double-tap)
  let gravityEnabled = true;
  function toggleGravity(){
    gravityEnabled = !gravityEnabled;
    engine.gravity.y = gravityEnabled ? 1 : 0;
  }

  // client -> canvas coords (canvas uses pixel size)
  function clientToCanvas(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  // POWER: only increases when you throw the box (strong release)
  let power = 20; // 0..100
  const POWER_MIN = 0;
  const POWER_MAX = 100;
  const THROW_POWER_GAIN = 0.02;   // gain per px/s (tuned)
  const THROW_THRESHOLD = 200;     // px/s threshold to count as a throw

  // pickup/hold/throw state
  let holding = false;
  let holdPointerId = null;
  let holdPointerType = null;
  let holdOffset = { x:0, y:0 };
  let lastHoldPos = null;
  let lastHoldTime = 0;

  // helper: distance between two points
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  // Start holding only if pointer is over the box and no other pointer is holding
  function tryStartHold(pointerId, pointerType, clientX, clientY, targetElement){
    if (holding) return false; // already held by another pointer
    const pos = clientToCanvas(clientX, clientY);
    const boxPos = { x: box.position.x, y: box.position.y };
    const d = dist(pos, boxPos);
    if (d <= boxSize * 0.7){
      holding = true;
      holdPointerId = pointerId;
      holdPointerType = pointerType;
      holdOffset.x = pos.x - boxPos.x;
      holdOffset.y = pos.y - boxPos.y;
      lastHoldPos = pos;
      lastHoldTime = performance.now();
      // zero velocity while holding so it follows exactly
      Body.setVelocity(box, { x:0, y:0 });
      // capture pointer on the canvas so pointer events continue even if pointer leaves the element
      try {
        if (targetElement && targetElement.setPointerCapture) targetElement.setPointerCapture(pointerId);
        else if (canvas.setPointerCapture) canvas.setPointerCapture(pointerId);
      } catch (err) {}
      return true;
    }
    return false;
  }

  function moveHold(clientX, clientY){
    if (!holding) return;
    const pos = clientToCanvas(clientX, clientY);
    const targetX = pos.x - holdOffset.x;
    const targetY = pos.y - holdOffset.y;
    // set position directly so it follows pointer precisely
    Body.setPosition(box, { x: targetX, y: targetY });
    // keep velocity low while dragging to avoid jitter
    Body.setVelocity(box, { x:0, y:0 });
    lastHoldPos = pos;
    lastHoldTime = performance.now();
  }

  function endHold(clientX, clientY, releaseTarget){
    if (!holding) return;
    const now = performance.now();
    const pos = clientToCanvas(clientX, clientY);
    const dt = Math.max(1, now - lastHoldTime); // ms
    const vx = (pos.x - lastHoldPos.x) / (dt / 1000); // px/s
    const vy = (pos.y - lastHoldPos.y) / (dt / 1000); // px/s

    // compute throw speed
    const speed = Math.hypot(vx, vy);

    // apply throw velocity so it slides naturally on both mobile and PC
    // scale down to world units; tuned for feel
    const velocityScale = 0.035; // increased so mobile sliding feels like PC
    Body.setVelocity(box, { x: vx * velocityScale, y: vy * velocityScale });

    // If this was a throw (strong release), increase power
    if (speed > THROW_THRESHOLD) {
      const gain = speed * THROW_POWER_GAIN * 0.01; // tuned small gain
      power = Math.min(POWER_MAX, power + gain);
    }

    // release pointer capture if we captured it
    try {
      if (releaseTarget && releaseTarget.releasePointerCapture) releaseTarget.releasePointerCapture(holdPointerId);
      else if (canvas.releasePointerCapture) canvas.releasePointerCapture(holdPointerId);
    } catch (err) {}

    // clear hold state
    holding = false;
    holdPointerId = null;
    holdPointerType = null;
    lastHoldPos = null;
  }

  // Pointer handling: robust across mouse & touch
  // Use canvas as primary capture target; pointer events will be delivered to canvas while captured.
  canvas.addEventListener('pointerdown', (e) => {
    // only left mouse button for mouse
    if (e.pointerType === 'mouse' && e.button !== 0) return;

    const started = tryStartHold(e.pointerId, e.pointerType, e.clientX, e.clientY, e.target);
    if (started) {
      e.preventDefault();
    }
  }, { passive:false });

  // pointermove on document so movement continues even if pointer leaves canvas (pointer capture ensures events)
  document.addEventListener('pointermove', (e) => {
    // If holding with this pointer, move the box
    if (holding && e.pointerId === holdPointerId) {
      moveHold(e.clientX, e.clientY);
      e.preventDefault();
      return;
    }

    // Otherwise, allow quick "smack" pushes when pointer moves fast near the box
    const rect = canvas.getBoundingClientRect();
    const boxScreenX = box.position.x * (rect.width / canvas.width) + rect.left;
    const boxScreenY = box.position.y * (rect.height / canvas.height) + rect.top;

    // compute delta since last frame (store on window)
    const dx = e.clientX - (window._rb_lastMouseX || e.clientX);
    const dy = e.clientY - (window._rb_lastMouseY || e.clientY);
    const speed = Math.hypot(dx, dy);
    window._rb_lastMouseX = e.clientX;
    window._rb_lastMouseY = e.clientY;

    const distX = e.clientX - boxScreenX;
    const distY = e.clientY - boxScreenY;
    const distToBox = Math.hypot(distX, distY);

    const INTERACT_RADIUS = 180;
    const SPEED_THRESHOLD = 8;
    if (distToBox < INTERACT_RADIUS && speed > SPEED_THRESHOLD) {
      // small smack force; scale by current power so low power = weaker smacks
      const punchForce = 0.005 * Math.max(0.2, power / POWER_MAX);
      Body.applyForce(box, box.position, { x: dx * punchForce, y: dy * punchForce });
    }
  }, { passive:false });

  // pointerup on document to ensure release is handled even if pointer is outside canvas
  document.addEventListener('pointerup', (e) => {
    if (holding && e.pointerId === holdPointerId) {
      endHold(e.clientX, e.clientY, e.target);
      e.preventDefault();
    }
  }, { passive:false });

  document.addEventListener('pointercancel', (e) => {
    if (holding && e.pointerId === holdPointerId) {
      // cancel hold without throw
      try {
        if (canvas.releasePointerCapture) canvas.releasePointerCapture(holdPointerId);
      } catch (err) {}
      holding = false;
      holdPointerId = null;
      holdPointerType = null;
      lastHoldPos = null;
    }
  }, { passive:false });

  // double-tap toggles gravity (touch)
  let lastTap = 0;
  canvas.addEventListener('touchend', (e) => {
    const now = Date.now();
    const dt = now - lastTap;
    if (dt < 300) {
      const touch = e.changedTouches[0];
      const rect = canvas.getBoundingClientRect();
      const boxScreenX = box.position.x * (rect.width / canvas.width) + rect.left;
      const boxScreenY = box.position.y * (rect.height / canvas.height) + rect.top;
      const dx = touch.clientX - boxScreenX;
      const dy = touch.clientY - boxScreenY;
      const distToBox = Math.hypot(dx, dy);
      if (distToBox < boxSize / 1.2) toggleGravity();
      lastTap = 0;
      return;
    }
    lastTap = now;
  });

  // right-click toggles gravity on PC
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const boxScreenX = box.position.x * (rect.width / canvas.width) + rect.left;
    const boxScreenY = box.position.y * (rect.height / canvas.height) + rect.top;
    const dx = e.clientX - boxScreenX;
    const dy = e.clientY - boxScreenY;
    const distToBox = Math.hypot(dx, dy);
    if (distToBox < boxSize / 1.2) toggleGravity();
  });

  // bounce off walls on collision so it doesn't escape viewport
  Events.on(engine, 'collisionStart', (event) => {
    const pairs = event.pairs;
    for (let i = 0; i < pairs.length; i++){
      const p = pairs[i];
      const a = p.bodyA;
      const b = p.bodyB;
      if ((a.label === 'box' && b.label === 'wall') || (b.label === 'box' && a.label === 'wall')) {
        const vel = box.velocity;
        const speed = Math.hypot(vel.x, vel.y);
        if (speed < 0.5) {
          const nudge = 0.02;
          Body.applyForce(box, box.position, { x: (Math.random()-0.5)*nudge, y: -nudge });
          continue;
        }
        // small bounce impulse so it doesn't stick to walls
        const bounceMultiplier = isMobile ? 1.2 : 1.0;
        const impulseScale = 0.0008 * bounceMultiplier;
        Body.applyForce(box, box.position, { x: -vel.x * impulseScale, y: -vel.y * impulseScale });
        const originalRest = box.restitution || 0.8;
        box.restitution = Math.max(originalRest, 1.0 * bounceMultiplier);
        setTimeout(() => { box.restitution = originalRest; }, 220);
      }
    }
  });

  // clamp velocity (allow higher top speed so sliding is visible)
  Events.on(engine, 'beforeUpdate', () => {
    const maxSpeed = 120;
    let vx = box.velocity.x;
    let vy = box.velocity.y;
    if (vx > maxSpeed) vx = maxSpeed;
    if (vx < -maxSpeed) vx = -maxSpeed;
    if (vy > maxSpeed) vy = maxSpeed;
    if (vy < -maxSpeed) vy = -maxSpeed;
    Body.setVelocity(box, { x: vx, y: vy });
  });

  // runner/render
  const runner = Runner.create();
  function startGame(){
    Runner.run(runner, engine);
    Render.run(render);
  }

  // device tilt only on mobile (optional)
  async function startMotion(){
    if (!isMobile) return;
    if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function"){
      try {
        const permission = await DeviceMotionEvent.requestPermission();
        if (permission !== "granted") return;
      } catch {}
    }
    window.addEventListener('deviceorientation', (event) => {
      const tiltX = event.gamma;
      const tiltY = event.beta;
      if (tiltX == null || tiltY == null) return;
      if (gravityEnabled){
        engine.gravity.x = tiltX / 30;
        engine.gravity.y = tiltY / 30;
      }
    });
  }

  // play button: request fullscreen then start
  playButton.addEventListener('click', async () => {
    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) await el.msRequestFullscreen();
    } catch {}
    playButton.style.display = 'none';
    startMotion();
    startGame();
  });

  </script>
</body>
</html>
